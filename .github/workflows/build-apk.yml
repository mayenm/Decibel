name: Build APK
on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Build APK
        run: |
          bubblewrap init --manifest https://YOURNAME.github.io/YOURREPO/manifest.json
          bubblewrap build

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: app-release
          path: "*.apk"
