name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Configure Bubblewrap JDK and SDK paths
        run: |
          mkdir -p ~/.bubblewrap
          cat > ~/.bubblewrap/config.json << EOF
          {
            "jdkPath": "$JAVA_HOME",
            "androidSdkPath": "$ANDROID_SDK_ROOT"
          }
          EOF

      - name: Fix Bubblewrap SDK Path
        run: |
          if [ ! -e "$ANDROID_SDK_ROOT/bin" ]; then
            ln -s "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin" "$ANDROID_SDK_ROOT/bin"
          fi

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > decibel.keystore

      - name: Write twa-manifest.json
        run: |
          cat > twa-manifest.json << 'EOF'
          {
            "packageId": "com.mayenm.decibel",
            "host": "mayenm.github.io",
            "name": "Decibel",
            "launcherName": "Decibel",
            "display": "standalone",
            "orientation": "default",
            "themeColor": "#000000",
            "navigationColor": "#000000",
            "backgroundColor": "#000000",
            "startUrl": "/Decibel/",
            "iconUrl": "https://mayenm.github.io/Decibel/icon-512.png",
            "splashScreenFadeOutDuration": 300,
            "shortcuts": [],
            "generatorApp": "bubblewrap-cli",
            "webManifestUrl": "https://mayenm.github.io/Decibel/manifest.json",
            "fallbackType": "customtabs",
            "features": {},
            "alphaDependencies": { "enabled": false },
            "enableNotifications": false,
            "appVersionCode": 2,
            "appVersion": "1.0.1",
            "signingKey": {
              "path": "./decibel.keystore",
              "alias": "${{ secrets.KEY_ALIAS }}"
            },
            "minSdkVersion": 21,
            "rotationEnabled": true,
            "fullScopeUrl": "https://mayenm.github.io/Decibel/",
            "locationDelegation": { "enabled": false }
          }
          EOF

      - name: Update TWA Project
        run: bubblewrap update --skipVersionUpgrade

      - name: Build APK
        env:
          BUBBLEWRAP_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          BUBBLEWRAP_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: bubblewrap build

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: "*.apk"
