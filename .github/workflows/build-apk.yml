name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:          # lets you trigger a build manually from the Actions tab

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > decibel.keystore

      - name: Write twa-manifest.json
        run: |
          cat > twa-manifest.json << 'EOF'
          {
            "packageId": "com.mayenm.decibel",
            "host": "mayenm.github.io",
            "name": "Decibel",
            "launcherName": "Decibel",
            "display": "standalone",
            "orientation": "default",
            "themeColor": "#000000",
            "navigationColor": "#000000",
            "backgroundColor": "#000000",
            "startUrl": "/Decibel/",
            "iconUrl": "https://mayenm.github.io/Decibel/icon-512.png",
            "splashScreenFadeOutDuration": 300,
            "shortcuts": [],
            "generatorApp": "bubblewrap-cli",
            "webManifestUrl": "https://mayenm.github.io/Decibel/manifest.json",
            "fallbackType": "customtabs",
            "features": {},
            "alphaDependencies": { "enabled": false },
            "enableNotifications": false,
            "appVersionCode": 1,
            "appVersion": "1.0.0",
            "signingKey": {
              "path": "./decibel.keystore",
              "alias": "${{ secrets.KEY_ALIAS }}"
            },
            "minSdkVersion": 19,
            "rotationEnabled": true,
            "fullScopeUrl": "https://mayenm.github.io/Decibel/",
            "locationDelegation": { "enabled": false }
          }
          EOF

      # Bubblewrap asks 4 prompts in order:
      #   1. Install JDK?          → n          (we already have Java 17)
      #   2. Keystore password     → $KS_PASS
      #   3. Key password          → $KEY_PASS
      #   4. Path to JDK 17        → $JAVA_HOME (set automatically by setup-java, asked LAST)
      - name: Build APK
        env:
          KS_PASS: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASS: ${{ secrets.KEY_PASSWORD }}
        run: printf 'n\n%s\n%s\n%s\n' "$KS_PASS" "$KEY_PASS" "$JAVA_HOME" | bubblewrap build

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: "*.apk"
